# puppy.yaml — project configuration.
# For a single-pack repo, place at: puppy/puppy.yaml
# For a multi-pack repo, place at: puppy/{packname}/puppy.yaml

# Project type: pack, mod, or world. Required.
type: pack

# Display name and internal handle.
# Both are derived from the directory name if omitted.
name: Neon
# handle: neon   # lowercase slug; derived from name if omitted

# Version published with 'puppy push -c file'.
# Can be overridden on the CLI with --version.
version: "1.0.0"

# Whether 'push' skips uploads whose content is unchanged since the last push
# (tracked in puppy/hashes.yaml). Default true. Set false to upload only the
# categories named with -c (default 'data').
# use_hashes: true

# One-line description shown in site search results.
summary: A vibrant, neon-lit resource pack that makes vanilla Minecraft glow.

# License (SPDX identifier).
license: MIT

# Minecraft version(s) to tag the upload against.
# A plain string means exact version; see spec for range/latest options.
minecraft: "1.21.4"

# Pack resolution. A neutral field: it expands to the right per-site field
# automatically (CurseForge category, Modrinth resolution, PMC tags).
resolution: 16

# Optional: YouTube video ID.
# video: dQw4w9WgXcQ

# Optional: requires OptiFine.
optifine: false

# External links (all optional).
links:
  home: https://example.com/neon
  source: https://github.com/example/neon
  issues: https://github.com/example/neon/issues
  # kofi: https://ko-fi.com/example
  # patreon: https://patreon.com/example

# Platform IDs and slugs.
# Run 'puppy create' to create the project and fill these in automatically,
# or run 'puppy pull' if the project already exists on the platforms.
curseforge:
  id: null
  slug: neon
  # category: 16x   # resolution category; taken from neutral 'resolution' if omitted

modrinth:
  id: null
  slug: neon
  category: vanilla-like   # Modrinth content category

planetminecraft:
  id: null
  slug: neon
  category: Simplistic     # PMC content category
  progress: 100
  modifies:
    terrain: true
    gui: true
    items: true
    mobs: false
