# images.yaml — image gallery metadata.
# Place at: puppy/images.yaml  (or puppy/images/images.yaml if storing images inside puppy/).
#
# Images are uploaded in the order listed.
# Files are resolved relative to this file unless 'source' is set.

# Optional: directory where image files live (relative to this file).
# If absent, images are loaded from puppy/images/.
source: ../screenshots

images:
  - name: Overview
    description: Default plains biome showing terrain and sky
    file: overview           # .png extension optional; will also find .jpg, .webp
    featured: true           # promoted as featured image on supporting sites
    # To place this image in the description text, reference it there with
    # {{ img("overview") }} (or its CDN url via {{ images.overview }}).

  - name: Villages
    description: Village with custom textures
    file: village

  - name: Nether
    description: Nether biome
    file: nether

# Special images (not part of the regular gallery):
#
# pack.png   — icon shown in site listings (square PNG, staged to 512×512, auto-discovered)
# banner.png — large hero image; downloaded by 'pull' when a site has one, not uploaded
# logo.png   — project logo; downloaded by 'pull' when a site has one, not uploaded
